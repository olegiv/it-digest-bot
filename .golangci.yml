version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - revive
    - gocritic
  settings:
    gosec:
      excludes:
        # G101: env-var NAMES are not credentials themselves.
        - G101
        # G304: file paths come from config or CLI flag, both operator-supplied.
        - G304
        # G404: rand/v2 is used only for retry-jitter, not cryptographic purposes.
        - G404
        # The gosec "URL provided to HTTP request as taint input" finding
        # (rule ID varies across gosec versions: G107 in older releases,
        # G704 in newer) is suppressed by path+text below — request URLs
        # come from operator-supplied config (npm package, github repo,
        # feed URLs), the same trust boundary as G304.
    revive:
      rules:
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      # See gosec.excludes comment above. Match by message text so the
      # suppression survives gosec rule-ID renumbering across versions.
      - path: internal/httpx/client\.go
        text: "URL provided to HTTP request as taint|Potential HTTP request made with variable url|SSRF via taint analysis"
        linters:
          - gosec

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
